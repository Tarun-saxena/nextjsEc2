name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2HOST }}
          username: ${{ secrets.EC2USERNAME }}
          key: ${{ secrets.EC2SSHKEY }}
          script: |
            cd /home/ubuntu/website/nextjsEc2
            git pull origin main
            npm ci
            npm run build
            pm2 restart website